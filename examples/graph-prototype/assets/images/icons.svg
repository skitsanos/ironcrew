<?xml version="1.0" encoding="UTF-8"?>
<!--
  IronCrew DAG icon library.

  Every symbol uses `fill="none"` + `stroke="currentColor"` on the root so
  callers can recolor per-instance by setting `color` on the referencing
  <use> element. Children that need a solid fill (dots, arrowheads) set
  `fill="currentColor"` + `stroke="none"` explicitly.

  Referenced from HTML via:
      <svg><use href="assets/images/icons.svg#icon-task"/></svg>

  Referenced from X6 node markup via:
      { tagName: 'use', selector: 'icon' }
      ...
      attrs: { icon: { href: 'assets/images/icons.svg#icon-task' } }
-->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute">
  <defs>

    <!-- ───── Structural nodes ──────────────────────────────────── -->

    <!-- crew — container with four inner dots (the agents) -->
    <symbol id="icon-crew" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2.5"/>
      <circle cx="8.5"  cy="9"  r="1.4" fill="currentColor" stroke="none"/>
      <circle cx="15.5" cy="9"  r="1.4" fill="currentColor" stroke="none"/>
      <circle cx="8.5"  cy="15" r="1.4" fill="currentColor" stroke="none"/>
      <circle cx="15.5" cy="15" r="1.4" fill="currentColor" stroke="none"/>
    </symbol>

    <!-- agent — hexagon with centered dot (single entity / network node) -->
    <symbol id="icon-agent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12,2.5 20.5,7.5 20.5,16.5 12,21.5 3.5,16.5 3.5,7.5"/>
      <circle cx="12" cy="12" r="1.8" fill="currentColor" stroke="none"/>
    </symbol>

    <!-- task — checklist with two checkmark rows -->
    <symbol id="icon-task" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3.5" width="18" height="17" rx="2"/>
      <path d="M6.5 9.5 L8.5 11.5 L11.5 8.5"/>
      <line x1="13.5" y1="10.5" x2="17.5" y2="10.5"/>
      <path d="M6.5 16.5 L8.5 18.5 L11.5 15.5"/>
      <line x1="13.5" y1="17.5" x2="17.5" y2="17.5"/>
    </symbol>

    <!-- ───── Task subtype variants ──────────────────────────────── -->

    <!-- retry — counter-clockwise 3/4 arc with a pointer back to start -->
    <symbol id="icon-retry" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 12a8 8 0 1 1-8-8 8 8 0 0 1 5.66 2.34L20 8"/>
      <polyline points="20 3 20 8 15 8"/>
    </symbol>

    <!-- condition — diamond (classic flowchart decision) -->
    <symbol id="icon-condition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2.5 L21.5 12 L12 21.5 L2.5 12 Z"/>
    </symbol>

    <!-- foreach — two semicircular arcs with arrowheads forming a loop -->
    <symbol id="icon-foreach" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 8 A 7.5 7.5 0 0 0 5 8"/>
      <polyline points="8 5 5 8 8 11"/>
      <path d="M5 16 A 7.5 7.5 0 0 0 19 16"/>
      <polyline points="16 13 19 16 16 19"/>
    </symbol>

    <!-- foreach_parallel — three stacked horizontal lanes -->
    <symbol id="icon-foreach-parallel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3.5" width="18" height="4" rx="1"/>
      <rect x="3" y="10"  width="18" height="4" rx="1"/>
      <rect x="3" y="16.5" width="18" height="4" rx="1"/>
    </symbol>

    <!-- collaborative — two overlapping rounded squares -->
    <symbol id="icon-collaborative" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2.5" y="7" width="13" height="13" rx="2"/>
      <rect x="8.5" y="4" width="13" height="13" rx="2"/>
    </symbol>

    <!-- subworkflow — nested box (a crew within a crew) -->
    <symbol id="icon-subworkflow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2.5"/>
      <rect x="8" y="8" width="8"  height="8"  rx="1.5"/>
    </symbol>

    <!-- ───── Runtime-only event sources (deferred to live tier) ─── -->

    <!-- conversation — single speech bubble -->
    <symbol id="icon-conversation" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 0 1-9 9 8.87 8.87 0 0 1-4-1L3 21l1.5-4.5A9 9 0 1 1 21 12z"/>
    </symbol>

    <!-- dialog — two overlapping speech bubbles -->
    <symbol id="icon-dialog" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 10a6 6 0 0 1-6 6H4l2-2.5A6 6 0 1 1 14 10z"/>
      <path d="M10 14a6 6 0 0 0 6 6h4l-2-2.5A6 6 0 1 0 10 14z"/>
    </symbol>

    <!-- tool — simplified gear (circle + spokes) -->
    <symbol id="icon-tool" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3.5"/>
      <line x1="12" y1="2"  x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2"  y1="12" x2="5"  y2="12"/>
      <line x1="19" y1="12" x2="22" y2="12"/>
      <line x1="5"  y1="5"  x2="7"  y2="7"/>
      <line x1="17" y1="17" x2="19" y2="19"/>
      <line x1="5"  y1="19" x2="7"  y2="17"/>
      <line x1="17" y1="7"  x2="19" y2="5"/>
    </symbol>

    <!-- memory — database cylinder -->
    <symbol id="icon-memory" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="5" rx="8" ry="2.5"/>
      <path d="M4 5v7c0 1.4 3.6 2.5 8 2.5s8-1.1 8-2.5V5"/>
      <path d="M4 12v7c0 1.4 3.6 2.5 8 2.5s8-1.1 8-2.5v-7"/>
    </symbol>

    <!-- message — envelope -->
    <symbol id="icon-message" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="5" width="20" height="14" rx="2"/>
      <path d="M2 7l10 6.5L22 7"/>
    </symbol>

    <!-- ───── UI (toolbar) ──────────────────────────────────────── -->

    <symbol id="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="6 3 20 12 6 21 6 3"/>
    </symbol>
    <symbol id="icon-rotate-ccw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </symbol>
  </defs>
</svg>
