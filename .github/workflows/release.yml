name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ironcrew-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: ironcrew-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ironcrew-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ironcrew-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz ironcrew
          cd ../../..
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec mv {} release/ \;
          echo "## Checksums" > release/checksums.txt
          cat release/*.sha256 >> release/checksums.txt
          cat release/checksums.txt

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          name: IronCrew ${{ github.ref_name }}
          body: |
            ## IronCrew ${{ github.ref_name }}

            A compiled Rust runtime for Lua-defined AI agent crews.

            ### Installation

            Download the binary for your platform, extract, and add to your PATH:

            ```bash
            # macOS (Apple Silicon)
            tar xzf ironcrew-macos-arm64.tar.gz

            # macOS (Intel)
            tar xzf ironcrew-macos-amd64.tar.gz

            # Linux (x86_64)
            tar xzf ironcrew-linux-amd64.tar.gz

            # Linux (ARM64)
            tar xzf ironcrew-linux-arm64.tar.gz

            # Move to PATH
            chmod +x ironcrew
            sudo mv ironcrew /usr/local/bin/
            ```

            ### Quick start

            ```bash
            ironcrew init my-crew
            cd my-crew
            echo "OPENAI_API_KEY=sk-..." > .env
            ironcrew run .
            ```
          files: release/*
          draft: false
          prerelease: false
          make_latest: true
