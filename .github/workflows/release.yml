name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ironcrew-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: ironcrew-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ironcrew-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ironcrew-macos-arm64

    steps:
      - uses: actions/checkout@v6

      # Fail fast if someone pushed a tag whose version doesn't match
      # the crate's Cargo.toml — that combo otherwise ships an artifact
      # whose embedded CARGO_PKG_VERSION disagrees with the GitHub
      # release name and surprises downstream consumers.
      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "$tag" != "$crate" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (v$tag) does not match Cargo.toml version $crate"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz ironcrew
          cd ../../..
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec mv {} release/ \;
          echo "## Checksums" > release/checksums.txt
          cat release/*.sha256 >> release/checksums.txt
          cat release/checksums.txt

      - name: Extract release notes from tag annotation
        id: notes
        run: |
          # Use the annotated tag message as the release body. Falls back to a
          # minimal body if the tag is lightweight (no annotation).
          TAG_BODY=$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)')
          if [ -z "$TAG_BODY" ]; then
            TAG_BODY="IronCrew ${GITHUB_REF_NAME}"
          fi
          {
            echo 'body<<RELEASE_EOF'
            echo "$TAG_BODY"
            echo ''
            echo '---'
            echo ''
            echo '### Installation'
            echo ''
            echo '```bash'
            echo '# macOS (Apple Silicon)'
            echo 'tar xzf ironcrew-macos-arm64.tar.gz'
            echo ''
            echo '# macOS (Intel)'
            echo 'tar xzf ironcrew-macos-amd64.tar.gz'
            echo ''
            echo '# Linux (x86_64)'
            echo 'tar xzf ironcrew-linux-amd64.tar.gz'
            echo ''
            echo '# Linux (ARM64)'
            echo 'tar xzf ironcrew-linux-arm64.tar.gz'
            echo ''
            echo '# Move to PATH'
            echo 'chmod +x ironcrew'
            echo 'sudo mv ironcrew /usr/local/bin/'
            echo '```'
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          name: IronCrew ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: release/*
          draft: false
          prerelease: false
          make_latest: true
